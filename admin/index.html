<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — EasyQuran</title>
<link rel="stylesheet" href="/admin/style.css">
</head>
<body>
<div class="container">
  <h1>Admin Dashboard</h1>
  <div id="auth">
    <form id="login-form">
      <input id="email" type="email" placeholder="Email" required />
      <input id="password" type="password" placeholder="Password" required />
      <button id="login" type="submit">Sign in</button>
    </form>
    <button id="google-signin" type="button">Sign in with Google</button>
    <div id="unauth-msg" class="hidden"></div>
    <button id="logout" class="hidden">Sign out</button>
  </div>
  <div id="dashboard" class="hidden">
    <h2>Users</h2>
    <div id="loading">Loading...</div>
    <table id="users-table">
      <thead><tr><th>uid</th><th>email</th><th>data</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div id="error" class="hidden"></div>
</div>

<script type="module" src="/admin/admin.js"></script>
</body>
</html>
