<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        var path = window.location.pathname + window.location.search + window.location.hash;
        if (path === '/hadith' || path.startsWith('/hadith/')) {
            sessionStorage.setItem('spa_redirect_path', path);
            window.location.replace('/hadith/');
        } else if (path === '/quran' || path.startsWith('/quran/') || path.startsWith('/surah/')) {
            sessionStorage.setItem('spa_redirect_path', path);
            window.location.replace('/quran/');
        } else {
            console.warn('Unhandled path in 404.html:', path);
            window.location.replace('/');
        }
    </script>
</head>
<body>
</body>
</html>
