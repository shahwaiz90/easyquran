  <style>
    /* Override global body to keep this page dark */
    body {
      background: #004D40 !important;
      color: #fff !important;
    }

    /* Ensure content sits above decorations */
    .container {
      position: relative;
      z-index: 10;
    }

    * {
      box-sizing: border-box;
    }

    /* Header styles removed, using eq-header */

    /* Nav styles removed */

    /* PAGE */
    h1 {
      text-align: center;
      margin: 22px 0 6px;
    }

    .subtitle {
      text-align: center;
      opacity: .85;
      margin-bottom: 18px;
    }

    /* SEARCH + SELECTORS */
    .top-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 18px;
    }

    input,
    select {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      outline: none;
    }

    input {
      min-width: 260px;
    }

    /* PLAYER */
    .player {
      background: linear-gradient(135deg, #00695C, #004D40);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 18px;
      padding: 18px;
      margin: 0 auto 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, .25);
    }

    .player-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .track-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 6px;
    }

    .track-sub {
      font-size: 13px;
      opacity: .85;
      margin: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .12);
      font-size: 13px;
      user-select: none;
    }

    .bar {
      height: 10px;
      background: rgba(255, 255, 255, .25);
      border-radius: 999px;
      margin: 14px 0 10px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .fill {
      position: absolute;
      inset: 0;
      width: 0%;
      background: #fff;
      border-radius: 999px;
    }

    .time {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      opacity: .85;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
      /* ✅ allow wrapping */
      max-width: 100%;
    }


    .btn {
      width: 46px;
      height: 46px;
      min-width: 46px;
      min-height: 46px;
      padding: 0;
      /* Ensure no browser padding */
      flex: 0 0 auto;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 18px;
      background: rgba(255, 255, 255, .18);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .12s ease, background .12s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, .24);
    }

    .btn:active {
      transform: translateY(0px);
    }

    .btn-play {
      width: 62px;
      height: 62px;
      min-width: 62px;
      min-height: 62px;
      /* 🔑 fixed size */
      flex: 0 0 auto;
      /* 🔑 never stretch */
      background: #fff;
      color: #004D40;
      font-size: 22px;
    }

    .btn-play:hover {
      background: #fff;
    }

    .btn-active {
      background: #fff !important;
      color: #004D40 !important;
    }

    .btn-wide {
      width: auto;
      height: 46px;
      min-height: 46px;
      flex: 0 0 auto;
      /* 🔑 never stretch */
      border-radius: 14px;
      padding: 0 14px;
      font-size: 14px;
      white-space: nowrap;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      padding-bottom: 40px;
    }

    .card {
      background: rgba(255, 255, 255, .12);
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      position: relative;
      border: 1px solid rgba(255, 255, 255, .10);
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, .16);
      border-color: rgba(255, 255, 255, .18);
    }

    .card.playing {
      border: 2px solid #fff;
      background: rgba(255, 255, 255, .18);
    }

    .num {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .22);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .ar {
      font-size: 20px;
      direction: rtl;
      margin: 6px 0;
    }

    .meta {
      font-size: 13px;
      opacity: .85;
    }

    /* Footer styles removed */

    @media (max-width: 640px) {

      .controls {
        gap: 10px;
      }

      /* Move download button to its own row */
      .btn-wide {
        width: 100%;
        justify-content: center;
      }

    }
  </style>

  <script>
    /* ===== Surah list ===== */
    const surahs = [
      ["Al-Fatihah", "الفاتحة"], ["Al-Baqarah", "البقرة"], ["Ali 'Imran", "آل عمران"],
      ["An-Nisa", "النساء"], ["Al-Ma'idah", "المائدة"], ["Al-An'am", "الأنعام"],
      ["Al-A'raf", "الأعراف"], ["Al-Anfal", "الأنفال"], ["At-Tawbah", "التوبة"],
      ["Yunus", "يونس"], ["Hud", "هود"], ["Yusuf", "يوسف"], ["Ar-Ra'd", "الرعد"],
      ["Ibrahim", "إبراهيم"], ["Al-Hijr", "الحجر"], ["An-Nahl", "النحل"],
      ["Al-Isra", "الإسراء"], ["Al-Kahf", "الكهف"], ["Maryam", "مريم"],
      ["Taha", "طه"], ["Al-Anbya", "الأنبياء"], ["Al-Hajj", "الحج"],
      ["Al-Mu'minun", "المؤمنون"], ["An-Nur", "النور"], ["Al-Furqan", "الفرقان"],
      ["Ash-Shu'ara", "الشعراء"], ["An-Naml", "النمل"], ["Al-Qasas", "القصص"],
      ["Al-'Ankabut", "العنكبوت"], ["Ar-Rum", "الروم"], ["Luqman", "لقمان"],
      ["As-Sajdah", "السجدة"], ["Al-Ahzab", "الأحزاب"], ["Saba", "سبإ"],
      ["Fatir", "فاطر"], ["Ya-Sin", "يس"], ["As-Saffat", "الصافات"],
      ["Sad", "ص"], ["Az-Zumar", "الزمر"], ["Ghafir", "غافر"],
      ["Fussilat", "فصلت"], ["Ash-Shuraa", "الشورى"], ["Az-Zukhruf", "الزخرف"],
      ["Ad-Dukhan", "الدخان"], ["Al-Jathiyah", "الجاثية"], ["Al-Ahqaf", "الأحقاف"],
      ["Muhammad", "محمد"], ["Al-Fath", "الفتح"], ["Al-Hujurat", "الحجرات"],
      ["Qaf", "ق"], ["Adh-Dhariyat", "الذاريات"], ["At-Tur", "الطور"],
      ["An-Najm", "النجم"], ["Al-Qamar", "القمر"], ["Ar-Rahman", "الرحمن"],
      ["Al-Waqi'ah", "الواقعة"], ["Al-Hadid", "الحديد"], ["Al-Mujadila", "المجادلة"],
      ["Al-Hashr", "الحشر"], ["Al-Mumtahanah", "الممتحنة"], ["As-Saf", "الصف"],
      ["Al-Jumu'ah", "الجمعة"], ["Al-Munafiqun", "المنافقون"],
      ["At-Taghabun", "التغابن"], ["At-Talaq", "الطلاق"], ["At-Tahrim", "التحريم"],
      ["Al-Mulk", "الملك"], ["Al-Qalam", "القلم"], ["Al-Haqqah", "الحاقة"],
      ["Al-Ma'arij", "المعارج"], ["Nuh", "نوح"], ["Al-Jinn", "الجن"],
      ["Al-Muzzammil", "المزمل"], ["Al-Muddaththir", "المدثر"], ["Al-Qiyamah", "القيامة"],
      ["Al-Insan", "الإنسان"], ["Al-Mursalat", "المرسلات"], ["An-Naba", "النبأ"],
      ["An-Nazi'at", "النازعات"], ["'Abasa", "عبس"], ["At-Takwir", "التكوير"],
      ["Al-Infitar", "الإنفطار"], ["Al-Mutaffifin", "المطففين"], ["Al-Inshiqaq", "الإنشقاق"],
      ["Al-Buruj", "البروج"], ["At-Tariq", "الطارق"], ["Al-A'la", "الأعلى"],
      ["Al-Ghashiyah", "الغاشية"], ["Al-Fajr", "الفجر"], ["Al-Balad", "البلد"],
      ["Ash-Shams", "الشمس"], ["Al-Layl", "الليل"], ["Ad-Duhaa", "الضحى"],
      ["Ash-Sharh", "الشرح"], ["At-Tin", "التين"], ["Al-'Alaq", "العلق"],
      ["Al-Qadr", "القدر"], ["Al-Bayyinah", "البينة"], ["Az-Zalzalah", "الزلزلة"],
      ["Al-'Adiyat", "العاديات"], ["Al-Qari'ah", "القارعة"], ["At-Takathur", "التكاثر"],
      ["Al-'Asr", "العصر"], ["Al-Humazah", "الهمزة"], ["Al-Fil", "الفيل"],
      ["Quraysh", "قريش"], ["Al-Ma'un", "الماعون"], ["Al-Kawthar", "الكوثر"],
      ["Al-Kafirun", "الكافرون"], ["An-Nasr", "النصر"], ["Al-Masad", "المسد"],
      ["Al-Ikhlas", "الإخلاص"], ["Al-Falaq", "الفلق"], ["An-Nas", "الناس"]
    ];

    /* ===== DOM ===== */
    const audio = document.getElementById("audio");
    const grid = document.getElementById("grid");
    const player = document.getElementById("player");
    const search = document.getElementById("search");

    /* ✅ FIX: start idle (no default selection) */
    let currentSurah = null;      // null or 1..114
    let repeatOne = false;        // repeat current surah

    /* ===== URL builder (Full Surah) ===== */
    function surahUrl(n) {
      return `https://download.quranicaudio.com/qdc/mishari_al_afasy/murattal/${n}.mp3`;
    }

    /* ===== UI render ===== */
    function renderPlayer() {
      // ✅ Idle state UI (no surah selected yet)
      if (currentSurah == null) {
        player.innerHTML = `
      <div class="player-top">
        <div>
          <p class="track-title">Select a Surah to begin</p>
          <p class="track-sub">Tap any Surah below to start listening.</p>
        </div>
        <div class="pill" title="Playback options">
          <span>Mode:</span>
          <strong>Surah</strong>
        </div>
      </div>

      <div class="bar" title="Seek">
        <div class="fill" style="width:0%"></div>
      </div>

      <div class="time">
        <span>0:00</span>
        <span>0:00</span>
      </div>

      <div class="controls">
        <button class="btn" title="Previous" disabled style="opacity:.5;cursor:not-allowed">⏮</button>
        <button class="btn btn-play" title="Play" disabled style="opacity:.5;cursor:not-allowed">▶</button>
        <button class="btn" title="Next" disabled style="opacity:.5;cursor:not-allowed">⏭</button>
        <button class="btn" title="Repeat" disabled style="opacity:.5;cursor:not-allowed">🔁</button>
        <button class="btn btn-wide" title="Download" disabled style="opacity:.5;cursor:not-allowed">⬇ Download</button>
      </div>
    `;
        return;
      }

      const [en, ar] = surahs[currentSurah - 1];

      player.innerHTML = `
    <div class="player-top">
      <div>
        <p class="track-title">${currentSurah}. ${en}</p>
        <p class="track-sub">${ar} • Mishary Al-Afasy</p>
      </div>
      <div class="pill" title="Playback options">
        <span>Mode:</span>
        <strong>Surah</strong>
      </div>
    </div>

    <div class="bar" id="bar" title="Seek">
      <div class="fill" id="fill"></div>
    </div>

    <div class="time">
      <span id="cur">0:00</span>
      <span id="dur">0:00</span>
    </div>

    <div class="controls">
      <button class="btn" id="prevBtn" title="Previous Surah" ${currentSurah === 1 ? "disabled style='opacity:.6;cursor:not-allowed'" : ""}>⏮</button>
      <button class="btn btn-play" id="playBtn" title="Play/Pause">▶</button>
      <button class="btn" id="nextBtn" title="Next Surah" ${currentSurah === 114 ? "disabled style='opacity:.6;cursor:not-allowed'" : ""}>⏭</button>

      <button class="btn ${repeatOne ? "btn-active" : ""}" id="repeatBtn" title="Repeat One">🔁</button>
      <button class="btn btn-wide" id="downloadBtn" title="Download this Surah">⬇ Download</button>
    </div>
  `;

      // wire events
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");

      if (prevBtn && !prevBtn.disabled) prevBtn.onclick = prevSurah;
      if (nextBtn && !nextBtn.disabled) nextBtn.onclick = nextSurah;

      document.getElementById("playBtn").onclick = togglePlayPause;
      document.getElementById("repeatBtn").onclick = toggleRepeat;
      document.getElementById("downloadBtn").onclick = () => downloadSurah(currentSurah);
      document.getElementById("bar").onclick = seek;

      // reflect current play state on re-render
      syncPlayIcon();
      // reflect duration if already known
      const dur = document.getElementById("dur");
      if (dur && audio.duration) dur.textContent = formatTime(audio.duration);
    }

    function renderGrid(numbers) {
      grid.innerHTML = numbers.map(n => {
        const [en, ar] = surahs[n - 1];
        return `
      <div class="card" data-surah="${n}" onclick="playSurah(${n})">
        <div class="num">${n}</div>
        <h3>${en}</h3>
        <div class="ar">${ar}</div>
        <div class="meta">Tap to play</div>
      </div>
    `;
      }).join("");
      highlightPlayingCard();
    }

    function highlightPlayingCard() {
      document.querySelectorAll(".card").forEach(c => c.classList.remove("playing"));
      if (currentSurah == null) return;
      document.querySelector(`.card[data-surah="${currentSurah}"]`)?.classList.add("playing");
    }

    /* ===== Playback controls ===== */
    function playSurah(n) {
      const isSameSurah = (currentSurah === n);

      currentSurah = n;
      renderPlayer();
      highlightPlayingCard();

      // ✅ FIX: if same surah tapped again, force restart
      audio.pause();
      audio.currentTime = 0;

      audio.src = surahUrl(n);
      audio.load();

      // Called from user click → safe to call play()
      audio.play().catch(() => {
        // If any browser blocks (unlikely here), user can press play
        syncPlayIcon();
      });
    }

    function togglePlayPause() {
      if (currentSurah == null) return;

      if (audio.paused) {
        audio.play().catch(() => { });
      } else {
        audio.pause();
      }
    }

    function nextSurah() {
      if (currentSurah == null) return;
      if (currentSurah < 114) {
        playSurah(currentSurah + 1);
      }
    }

    function prevSurah() {
      if (currentSurah == null) return;
      if (currentSurah > 1) {
        playSurah(currentSurah - 1);
      }
    }

    function toggleRepeat() {
      repeatOne = !repeatOne;
      const repeatBtn = document.getElementById("repeatBtn");
      if (repeatBtn) repeatBtn.classList.toggle("btn-active", repeatOne);
    }

    /* ===== Audio events: keep icons always correct ===== */
    function syncPlayIcon() {
      const playBtn = document.getElementById("playBtn");
      if (!playBtn) return;
      playBtn.textContent = audio.paused ? "▶" : "⏸";
    }

    audio.onplay = () => syncPlayIcon();
    audio.onpause = () => syncPlayIcon();

    audio.onended = () => {
      if (currentSurah == null) return;

      if (repeatOne) {
        audio.currentTime = 0;
        audio.play().catch(() => { });
      } else {
        if (currentSurah < 114) {
          playSurah(currentSurah + 1);
        } else {
          syncPlayIcon();
        }
      }
    };

    audio.onloadedmetadata = () => {
      const dur = document.getElementById("dur");
      if (dur) dur.textContent = formatTime(audio.duration);
    };

    audio.ontimeupdate = () => {
      const cur = document.getElementById("cur");
      const fill = document.getElementById("fill");
      if (cur) cur.textContent = formatTime(audio.currentTime);
      if (fill && audio.duration) {
        fill.style.width = (audio.currentTime / audio.duration * 100) + "%";
      }
    };

    /* ===== Seek ===== */
    function seek(e) {
      if (!audio.duration) return;
      const rect = e.currentTarget.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      audio.currentTime = Math.max(0, Math.min(audio.duration, pct * audio.duration));
    }

    /* ===== Download ===== */
    function downloadSurah(n) {
      const a = document.createElement("a");
      a.href = surahUrl(n);
      a.download = `surah-${n}.mp3`;
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    /* Helpers */
    function formatTime(sec) {
      if (!sec || isNaN(sec)) return "0:00";
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    /* ===== Search ===== */
    search.oninput = (e) => {
      const q = e.target.value.trim().toLowerCase();

      // numeric direct
      const n = Number(q);
      if (q && !isNaN(n) && n >= 1 && n <= 114) {
        renderGrid([n]);
        return;
      }

      const matched = [];
      for (let i = 1; i <= 114; i++) {
        const en = surahs[i - 1][0].toLowerCase();
        if (!q || en.includes(q)) matched.push(i);
      }
      renderGrid(matched);
    };

    /* ===== Init ===== */
    renderPlayer(); // idle UI
    renderGrid(Array.from({ length: 114 }, (_, i) => i + 1));
  </script>

</body>
