<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Quran (Arabic Only) - EasyQuran Reader</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../js/components.js" defer></script>
    <script src="js/tarteel-taj-data.js" defer></script>
    <script src="js/taj-layout-data.js" defer></script>
    <script src="js/layouts.js" defer></script>
    <script src="js/verse-global-index.js" defer></script>
    <script src="js/verse-metadata.js?v=2" defer></script>
    <script src="js/full.js" defer></script>
</head>
<body class="quran-app-page">
    <eq-sidebar type="quran" active-tab="full-quran"></eq-sidebar>
    <div class="main-layout">
        <header class="header">
            <div class="header-left">
                <button class="mobile-toggle" id="sidebar-toggle"><i data-lucide="menu"></i></button>
            </div>
            <div class="header-center">
                <div class="full-header-controls">
                    <select id="surah-select" class="select-modern" style="flex: 1.5; min-width: 140px; height: 48px;">
                        <option value="" disabled selected>Surah...</option>
                    </select>
                    <select id="ayah-select" class="select-modern" style="width: 100px; height: 48px;">
                        <option value="" disabled selected>Ayat...</option>
                    </select>
                    <div class="page-jump-container">
                        <span class="page-input-label">PAGE</span>
                        <input type="number" id="page-jump-input" placeholder="0" class="page-input-field" min="1" max="548">
                        <span class="page-total">of 548</span>
                        <button onclick="handlePageJump()" class="jump-go-btn" title="Jump to Page">
                            <i data-lucide="chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <div class="content-area">
            <div id="full-history-banner" class="history-chip-banner" style="display: none;">
                <span class="history-label">Last Read:</span>
                <div id="history-items-container" class="history-chips"></div>
            </div>

            <div id="quran-full-render" class="full-quran-render">
                <!-- Data will be loaded here -->
            </div>
            
            <div id="load-more-trigger">
                <div class="loader-spinner"></div>
            </div>
        </div>

        <div class="audio-player-bar">
            <div id="audio-player-container" class="player-content">
                <div class="player-left">
                    <div class="player-info">
                        <span id="player-verse-info">1:1</span>
                    </div>
                </div>
                <div class="player-center">
                    <button id="player-repeat-btn" class="player-btn" title="Repeat" onclick="toggleRepeat()"><i data-lucide="repeat"></i></button>
                    <button id="player-prev-btn" class="player-btn" onclick="playPrevAyah()"><i data-lucide="skip-back"></i></button>
                    <button id="player-play-btn" class="player-btn play-main" onclick="togglePlayerPause()"><i data-lucide="play"></i></button>
                    <button id="player-stop-btn" class="player-btn stop" title="Stop" onclick="stopRecitation()"><i data-lucide="square"></i></button>
                    <button id="player-next-btn" class="player-btn" onclick="playNextAyah()"><i data-lucide="skip-forward"></i></button>
                </div>
                <div class="player-right">
                    <div class="reciter-selector-container">
                        <select id="player-reciter-select" class="player-select-modern" onchange="changeReciter(this.value)">
                            <!-- Populated via JS -->
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        window.addEventListener('load', () => {
            const sidebar = document.querySelector('eq-sidebar');
            const toggle = document.getElementById('sidebar-toggle');
            if (toggle && sidebar) toggle.onclick = () => sidebar.toggle();
            if (window.lucide) lucide.createIcons();
        });
    </script>
</body>
</html>
