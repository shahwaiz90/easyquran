        href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/js/components.js" defer></script>
    <script src="js/script.js" defer></script>
    <style>
        .logo-img {
            height: 32px;
            width: 32px;
            border-radius: 8px;
            margin-right: 12px;
        }
    </style>
</head>

    <eq-sidebar type="quran" active-tab="quran"></eq-sidebar>

    <!-- Main Content Layout -->
    <div class="main-layout">
        <!-- Modern Header -->
        <header class="header">

                    </button>
                </div>
                
                <div class="header-center" style="flex: 1; display: flex; justify-content: center; min-width: 0;">
                    <h2 id="current-surah-title">Loading Surah...</h2>
                </div>

                <div class="header-right" style="flex: 0 0 auto; display: flex; align-items: center; gap: 8px;">
                    <select id="verse-selector" class="select-modern" style="width: 80px;" title="Go to Verse">
                        <option value="" disabled selected>Ayah</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <main class="content-area">
            <div id="loading" class="loader" style="display: none;"></div>

            <!-- Verse Reader (Surah View) -->
            <div id="verses-container" class="verses-container">
                <!-- Verses will be dynamically injected here -->
            </div>
        </main>
    </div>

    <!-- Hidden audio element for fallback recitation -->
    <audio id="quran-audio" style="display: none;"></audio>

    <!-- Persistent Audio Player Bar -->
    <div id="audio-player-bar" class="audio-player-bar" style="display: flex;">
        <div class="player-content">
            <!-- Left: Reciter Choice -->
            <div class="player-left">
                <div class="mini-reciter-control">
                    <select id="player-reciter-select" class="player-select" onchange="changePlayerReciter(this.value)">
                        <!-- Reciters added via JS -->
                    </select>
                </div>
            </div>

            <!-- Center: Playback Controls -->
            <div class="player-center">
                <button class="player-btn" onclick="playPreviousAyah()" title="Previous Ayah">
                    <i data-lucide="skip-back"></i>
                </button>
                <button id="player-play-btn" class="player-btn play-main" onclick="togglePlayerPause()">
                    <i data-lucide="play"></i>
                </button>
                <button class="player-btn" onclick="playNextAyah()" title="Next Ayah">
                    <i data-lucide="skip-forward"></i>
                </button>
                <button id="player-stop-btn" class="player-btn stop" onclick="stopRecitation()" title="Stop">
                    <i data-lucide="square"></i>
                </button>
            </div>

            <!-- Right: Repeat and Progress -->
            <div class="player-right">
                <div class="player-info">
                    <span id="player-verse-info"
                        style="font-weight: 700; font-size: 0.85rem; color: var(--text-dark);">...</span>
                </div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="speed-control">
                        <select id="player-speed-select" class="player-select speed-select" onchange="changePlaybackSpeed(this.value)" title="Playback Speed">
                            <option value="1">1x</option>
                            <option value="1.3">1.3x</option>
                            <option value="1.5">1.5x</option>
                            <option value="1.8">1.8x</option>
                            <option value="2">2x</option>
                        </select>
                    </div>
                    <div class="repeat-control">
                        <button id="player-repeat-btn" class="player-btn secondary" onclick="toggleRepeatMode()"
                            title="Repeat Ayah">
                            <i data-lucide="repeat"></i>
                            <span id="repeat-count-badge" class="badge">1</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Comparative Modal -->
    <div id="comparative-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">
                <i data-lucide="x"></i>
            </button>
            <div class="modal-header">
                <h2 id="modal-title" style="color: var(--primary);">Verse</h2>
            </div>
            <div id="modal-arabic" class="arabic-text" style="text-align: center; margin-bottom: 30px;">
                <!-- Populate via JS -->
            </div>
            <div id="modal-comparative-body">
                <!-- Comparative results populate here -->
            </div>
        </div>
    </div>

    <!-- Quick Navigator Modal (Enhanced Dialog) -->
    <div id="navigator-modal" class="modal-overlay" onclick="handleOutsideNavigatorClick(event)">
        <div class="modal-content" style="max-width: 850px; padding: 0;">
            <div class="modal-header"
                style="background: var(--primary-color); color: white; padding: 25px 30px; border-radius: 20px 20px 0 0; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2 style="margin: 0; font-size: 1.5rem; display: flex; align-items: center; gap: 12px;">
                        <i data-lucide="compass"></i> Quick Navigator
                    </h2>
                    <p style="margin: 5px 0 0; opacity: 0.8; font-size: 0.85rem;">Select a Surah and Ayah to jump
                        directly there.</p>
                </div>
                <button class="modal-close"
                    style="color: white; border: 1px solid rgba(255,255,255,0.2); position: static;"
                    onclick="closeNavigator()">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <div style="padding: 25px 30px;">
                <!-- Search and Jump -->

                <div id="surah-navigator-grid" class="surah-grid"
                    style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; max-height: 400px; overflow-y: auto; padding: 5px;">
                    <!-- Surah grid injected via JS -->
                </div>
            </div>
        </div>
    </div>

</body>

</html>
