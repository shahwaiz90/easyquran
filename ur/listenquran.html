<head>

    <meta name="keywords" content="قرآن آن لائن سنیں, قرآن آڈیو, مشاری العفاسی, قرآن تلاوت, مفت قرآن آڈیو">

    <script type="application/ld+json">
  {
    "@context": "https://schema.org",

    <link rel="preload" href="css/global.css" as="style">
    <link rel="stylesheet" href="css/global.css">
    <script src="js/components.js" defer></script>

    <style>
        @font-face {
            font-family: 'UrduFont';
            src: url('../urdu.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            background: #004D40 !important;
            color: #fff !important;
            font-family: 'UrduFont', Inter, system-ui, sans-serif !important;
            font-size: 22px;
            line-height: 2.6;
        }

        .container {
            position: relative;
            z-index: 10;
        }

        * {
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            margin: 22px 0 6px;
            font-size: 32px;
            font-family: 'UrduFont', Inter, system-ui, sans-serif;
        }

        .subtitle {
            text-align: center;
            opacity: .85;
            margin-bottom: 18px;
            font-size: 18px;
        }

        .top-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 18px;
        }

        input,
        select {
            padding: 10px 14px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            outline: none;
            font-family: 'UrduFont', Inter, system-ui, sans-serif;
        }

        input {
            min-width: 260px;
        }

        /* PLAYER */
        .player {
            background: linear-gradient(135deg, #00695C, #004D40);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 18px;
            padding: 18px;
            margin: 0 auto 18px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, .25);
        }

        .player-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            flex-wrap: wrap;
        }

        .track-title {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 6px;
            font-family: 'UrduFont', Inter, system-ui, sans-serif;
        }

        .track-sub {
            font-size: 16px;
            opacity: .85;
            margin: 0;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, .12);
            border: 1px solid rgba(255, 255, 255, .12);
            font-size: 15px;
            user-select: none;
        }

        .bar {
            height: 10px;
            background: rgba(255, 255, 255, .25);
            border-radius: 999px;
            margin: 14px 0 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .fill {
            position: absolute;
            inset: 0;
            width: 0%;
            background: #fff;
            border-radius: 999px;
        }

        .time {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            opacity: .85;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
            max-width: 100%;
        }

        .btn {
            width: 46px;
            height: 46px;
            min-width: 46px;
            min-height: 46px;
            padding: 0;
            flex: 0 0 auto;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 18px;
            background: rgba(255, 255, 255, .18);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform .12s ease, background .12s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, .24);
        }

        .btn-play {
            width: 62px;
            height: 62px;
            min-width: 62px;
            min-height: 62px;
            flex: 0 0 auto;
            background: #fff;
            color: #004D40;
            font-size: 22px;
        }

        .btn-play:hover {
            background: #fff;
        }

        .btn-active {
            background: #fff !important;
            color: #004D40 !important;
        }

        .btn-wide {
            width: auto;
            height: 46px;
            min-height: 46px;
            flex: 0 0 auto;
            border-radius: 14px;
            padding: 0 14px;
            font-size: 16px;
            white-space: nowrap;
            font-family: 'UrduFont', Inter, system-ui, sans-serif;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            padding-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, .12);
            border-radius: 14px;
            padding: 14px;
            cursor: pointer;
            position: relative;
            border: 1px solid rgba(255, 255, 255, .10);
            transition: transform .15s ease, background .15s ease, border-color .15s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, .16);
            border-color: rgba(255, 255, 255, .18);
        }

        .card.playing {
            border: 2px solid #fff;
            background: rgba(255, 255, 255, .18);
        }

        .num {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .22);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
        }

        .ar {
            font-size: 22px;
            direction: rtl;
            margin: 6px 0;
        }

        .meta {
            font-size: 15px;
            opacity: .85;
        }

        .card h3 {
            font-size: 17px;
            font-family: 'UrduFont', Inter, system-ui, sans-serif;
            padding-right: 40px;
            margin: 0 0 4px;
        }

        @media (max-width: 640px) {
            .controls {
                gap: 10px;
            }

            .btn-wide {
                width: 100%;
                justify-content: center;
            }
        }
    </style>

    <link rel="apple-touch-icon" href="newappicon.webp">
    <meta name="theme-color" content="#004D40">
</head>

<body>
    <eq-header active="listen"></eq-header>

    <main class="container">
        <h1>قرآن مجید سنیں</h1>
        <div class="subtitle">مشاری راشد العفاسی کی تلاوت</div>

        <div class="top-controls">
            <input id="search" placeholder="🔍 سورت کا نام یا نمبر تلاش کریں (مثلاً 113)" dir="rtl">
            <select id="reciter">
                <option value="afasy">🎙 مشاری العفاسی</option>
            </select>
        </div>

        <div id="player" class="player"></div>
        <div id="grid" class="grid"> </div>
    </main>

    <eq-footer></eq-footer>

    <audio id="audio" preload="metadata"></audio>

    <script>
        /* ===== Surah list ===== */
        const surahs = [
            ["Al-Fatihah", "الفاتحة"], ["Al-Baqarah", "البقرة"], ["Ali 'Imran", "آل عمران"],
            ["An-Nisa", "النساء"], ["Al-Ma'idah", "المائدة"], ["Al-An'am", "الأنعام"],
            ["Al-A'raf", "الأعراف"], ["Al-Anfal", "الأنفال"], ["At-Tawbah", "التوبة"],
            ["Yunus", "يونس"], ["Hud", "هود"], ["Yusuf", "يوسف"], ["Ar-Ra'd", "الرعد"],
            ["Ibrahim", "إبراهيم"], ["Al-Hijr", "الحجر"], ["An-Nahl", "النحل"],
            ["Al-Isra", "الإسراء"], ["Al-Kahf", "الكهف"], ["Maryam", "مريم"],
            ["Taha", "طه"], ["Al-Anbya", "الأنبياء"], ["Al-Hajj", "الحج"],
            ["Al-Mu'minun", "المؤمنون"], ["An-Nur", "النور"], ["Al-Furqan", "الفرقان"],
            ["Ash-Shu'ara", "الشعراء"], ["An-Naml", "النمل"], ["Al-Qasas", "القصص"],
            ["Al-'Ankabut", "العنكبوت"], ["Ar-Rum", "الروم"], ["Luqman", "لقمان"],
            ["As-Sajdah", "السجدة"], ["Al-Ahzab", "الأحزاب"], ["Saba", "سبإ"],
            ["Fatir", "فاطر"], ["Ya-Sin", "يس"], ["As-Saffat", "الصافات"],
            ["Sad", "ص"], ["Az-Zumar", "الزمر"], ["Ghafir", "غافر"],
            ["Fussilat", "فصلت"], ["Ash-Shuraa", "الشورى"], ["Az-Zukhruf", "الزخرف"],
            ["Ad-Dukhan", "الدخان"], ["Al-Jathiyah", "الجاثية"], ["Al-Ahqaf", "الأحقاف"],
            ["Muhammad", "محمد"], ["Al-Fath", "الفتح"], ["Al-Hujurat", "الحجرات"],
            ["Qaf", "ق"], ["Adh-Dhariyat", "الذاريات"], ["At-Tur", "الطور"],
            ["An-Najm", "النجم"], ["Al-Qamar", "القمر"], ["Ar-Rahman", "الرحمن"],
            ["Al-Waqi'ah", "الواقعة"], ["Al-Hadid", "الحديد"], ["Al-Mujadila", "المجادلة"],
            ["Al-Hashr", "الحشر"], ["Al-Mumtahanah", "الممتحنة"], ["As-Saf", "الصف"],
            ["Al-Jumu'ah", "الجمعة"], ["Al-Munafiqun", "المنافقون"],
            ["At-Taghabun", "التغابن"], ["At-Talaq", "الطلاق"], ["At-Tahrim", "التحريم"],
            ["Al-Mulk", "الملك"], ["Al-Qalam", "القلم"], ["Al-Haqqah", "الحاقة"],
            ["Al-Ma'arij", "المعارج"], ["Nuh", "نوح"], ["Al-Jinn", "الجن"],
            ["Al-Muzzammil", "المزمل"], ["Al-Muddaththir", "المدثر"], ["Al-Qiyamah", "القيامة"],
            ["Al-Insan", "الإنسان"], ["Al-Mursalat", "المرسلات"], ["An-Naba", "النبأ"],
            ["An-Nazi'at", "النازعات"], ["'Abasa", "عبس"], ["At-Takwir", "التكوير"],
            ["Al-Infitar", "الإنفطار"], ["Al-Mutaffifin", "المطففين"], ["Al-Inshiqaq", "الإنشقاق"],
            ["Al-Buruj", "البروج"], ["At-Tariq", "الطارق"], ["Al-A'la", "الأعلى"],
            ["Al-Ghashiyah", "الغاشية"], ["Al-Fajr", "الفجر"], ["Al-Balad", "البلد"],
            ["Ash-Shams", "الشمس"], ["Al-Layl", "الليل"], ["Ad-Duhaa", "الضحى"],
            ["Ash-Sharh", "الشرح"], ["At-Tin", "التين"], ["Al-'Alaq", "العلق"],
            ["Al-Qadr", "القدر"], ["Al-Bayyinah", "البينة"], ["Az-Zalzalah", "الزلزلة"],
            ["Al-'Adiyat", "العاديات"], ["Al-Qari'ah", "القارعة"], ["At-Takathur", "التكاثر"],
            ["Al-'Asr", "العصر"], ["Al-Humazah", "الهمزة"], ["Al-Fil", "الفيل"],
            ["Quraysh", "قريش"], ["Al-Ma'un", "الماعون"], ["Al-Kawthar", "الكوثر"],
            ["Al-Kafirun", "الكافرون"], ["An-Nasr", "النصر"], ["Al-Masad", "المسد"],
            ["Al-Ikhlas", "الإخلاص"], ["Al-Falaq", "الفلق"], ["An-Nas", "الناس"]
        ];

        const audio = document.getElementById("audio");
        const grid = document.getElementById("grid");
        const player = document.getElementById("player");
        const search = document.getElementById("search");

        let currentSurah = null;
        let repeatOne = false;

        function surahUrl(n) {
            return `https://download.quranicaudio.com/qdc/mishari_al_afasy/murattal/${n}.mp3`;
        }

        function renderPlayer() {
            if (currentSurah == null) {
                player.innerHTML = `
          <div class="player-top">
            <div>
              <p class="track-title">سننے کے لیے سورت منتخب کریں</p>
              <p class="track-sub">نیچے کسی بھی سورت پر ٹیپ کریں۔</p>
            </div>
            <div class="pill"><span>موڈ:</span><strong>سورت</strong></div>
          </div>
          <div class="bar"><div class="fill" style="width:0%"></div></div>
          <div class="time"><span>0:00</span><span>0:00</span></div>
          <div class="controls">
            <button class="btn" disabled style="opacity:.5;cursor:not-allowed">⏮</button>
            <button class="btn btn-play" disabled style="opacity:.5;cursor:not-allowed">▶</button>
            <button class="btn" disabled style="opacity:.5;cursor:not-allowed">⏭</button>
            <button class="btn" disabled style="opacity:.5;cursor:not-allowed">🔁</button>
            <button class="btn btn-wide" disabled style="opacity:.5;cursor:not-allowed">⬇ ڈاؤنلوڈ</button>
          </div>`;
                return;
            }

            const [en, ar] = surahs[currentSurah - 1];
            player.innerHTML = `
        <div class="player-top">
          <div>
            <p class="track-title">${currentSurah}. ${ar}</p>
            <p class="track-sub">${en} • مشاری العفاسی</p>
          </div>
          <div class="pill"><span>موڈ:</span><strong>سورت</strong></div>
        </div>
        <div class="bar" id="bar">
          <div class="fill" id="fill"></div>
        </div>
        <div class="time"><span id="cur">0:00</span><span id="dur">0:00</span></div>
        <div class="controls">
          <button class="btn" id="prevBtn" ${currentSurah === 1 ? "disabled style='opacity:.6;cursor:not-allowed'" : ""}>⏮</button>
          <button class="btn btn-play" id="playBtn">▶</button>
          <button class="btn" id="nextBtn" ${currentSurah === 114 ? "disabled style='opacity:.6;cursor:not-allowed'" : ""}>⏭</button>
          <button class="btn ${repeatOne ? "btn-active" : ""}" id="repeatBtn">🔁</button>
          <button class="btn btn-wide" id="downloadBtn">⬇ ڈاؤنلوڈ</button>
        </div>`;

            const prevBtn = document.getElementById("prevBtn");
            const nextBtn = document.getElementById("nextBtn");
            if (prevBtn && !prevBtn.disabled) prevBtn.onclick = prevSurah;
            if (nextBtn && !nextBtn.disabled) nextBtn.onclick = nextSurah;
            document.getElementById("playBtn").onclick = togglePlayPause;
            document.getElementById("repeatBtn").onclick = toggleRepeat;
            document.getElementById("downloadBtn").onclick = () => downloadSurah(currentSurah);
            document.getElementById("bar").onclick = seek;
            syncPlayIcon();
            const dur = document.getElementById("dur");
            if (dur && audio.duration) dur.textContent = formatTime(audio.duration);
        }

        function renderGrid(numbers) {
            grid.innerHTML = numbers.map(n => {
                const [en, ar] = surahs[n - 1];
                return `
          <div class="card" data-surah="${n}" onclick="playSurah(${n})">
            <div class="num">${n}</div>
            <h3>${en}</h3>
            <div class="ar">${ar}</div>
            <div class="meta">سننے کے لیے ٹیپ کریں</div>
          </div>`;
            }).join("");
            highlightPlayingCard();
        }

        function highlightPlayingCard() {
            document.querySelectorAll(".card").forEach(c => c.classList.remove("playing"));
            if (currentSurah == null) return;
            document.querySelector(`.card[data-surah="${currentSurah}"]`)?.classList.add("playing");
        }

        function playSurah(n) {
            currentSurah = n;
            renderPlayer();
            highlightPlayingCard();
            audio.pause();
            audio.currentTime = 0;
            audio.src = surahUrl(n);
            audio.load();
            audio.play().catch(() => syncPlayIcon());
        }

        function togglePlayPause() {
            if (currentSurah == null) return;
            if (audio.paused) { audio.play().catch(() => { }); } else { audio.pause(); }
        }
        function nextSurah() { if (currentSurah && currentSurah < 114) playSurah(currentSurah + 1); }
        function prevSurah() { if (currentSurah && currentSurah > 1) playSurah(currentSurah - 1); }
        function toggleRepeat() {
            repeatOne = !repeatOne;
            const btn = document.getElementById("repeatBtn");
            if (btn) btn.classList.toggle("btn-active", repeatOne);
        }
        function syncPlayIcon() {
            const btn = document.getElementById("playBtn");
            if (btn) btn.textContent = audio.paused ? "▶" : "⏸";
        }

        audio.onplay = () => syncPlayIcon();
        audio.onpause = () => syncPlayIcon();
        audio.onended = () => {
            if (repeatOne) { audio.currentTime = 0; audio.play().catch(() => { }); }
            else if (currentSurah < 114) { playSurah(currentSurah + 1); }
            else { syncPlayIcon(); }
        };
        audio.onloadedmetadata = () => {
            const dur = document.getElementById("dur");
            if (dur) dur.textContent = formatTime(audio.duration);
        };
        audio.ontimeupdate = () => {
            const cur = document.getElementById("cur");
            const fill = document.getElementById("fill");
            if (cur) cur.textContent = formatTime(audio.currentTime);
            if (fill && audio.duration) fill.style.width = (audio.currentTime / audio.duration * 100) + "%";
        };

        function seek(e) {
            if (!audio.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            audio.currentTime = Math.max(0, Math.min(audio.duration, pct * audio.duration));
        }
        function downloadSurah(n) {
            const a = document.createElement("a");
            a.href = surahUrl(n); a.download = `surah-${n}.mp3`;
            document.body.appendChild(a); a.click(); a.remove();
        }
        function formatTime(sec) {
            if (!sec || isNaN(sec)) return "0:00";
            return `${Math.floor(sec / 60)}:${String(Math.floor(sec % 60)).padStart(2, "0")}`;
        }

        search.oninput = e => {
            const q = e.target.value.trim().toLowerCase();
            const n = Number(q);
            if (q && !isNaN(n) && n >= 1 && n <= 114) { renderGrid([n]); return; }
            const matched = [];
            for (let i = 1; i <= 114; i++) {
                if (!q || surahs[i - 1][0].toLowerCase().includes(q)) matched.push(i);
            }
            renderGrid(matched);
        };

        renderPlayer();
        renderGrid(Array.from({ length: 114 }, (_, i) => i + 1));
    </script>
</body>

</html>
